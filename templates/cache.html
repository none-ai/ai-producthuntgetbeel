<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>缓存信息 - GetBeel</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
        }

        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            color: #666;
            font-weight: 600;
        }

        .btn {
            display: inline-block;
            padding: 10px 25px;
            background: #e74c3c;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        .btn:hover {
            background: #c0392b;
        }

        .btn-secondary {
            background: #667eea;
        }

        .btn-secondary:hover {
            background: #5568d3;
        }

        .info-text {
            color: #666;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>缓存信息</h1>
        <nav>
            <a href="/">首页</a>
            <a href="/products">产品列表</a>
        </nav>
    </div>

    <div class="container">
        <div class="card">
            <h2>缓存数据</h2>
            {% if cache_info %}
            <table>
                <thead>
                    <tr>
                        <th>分类</th>
                        <th>数量</th>
                        <th>更新时间</th>
                    </tr>
                </thead>
                <tbody>
                    {% for category, info in cache_info.items() %}
                    <tr>
                        <td>{{ category }}</td>
                        <td>{{ info.count }}</td>
                        <td>{{ info.updated_at }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            {% else %}
            <p class="info-text">暂无缓存数据</p>
            {% endif %}
        </div>

        <div class="card">
            <h2>操作</h2>
            <button onclick="clearCache()" class="btn">清除所有缓存</button>
            <a href="/products" class="btn btn-secondary">查看产品</a>
        </div>

        <div class="card">
            <h2>关于缓存</h2>
            <p class="info-text">
                缓存有效期为 24 小时。首次访问时会自动从 Product Hunt API 获取数据并缓存。
                如果数据过期，系统会在下次访问时自动刷新。
            </p>
        </div>
    </div>

    <script>
        function clearCache() {
            if (confirm('确定要清除所有缓存吗？')) {
                window.location.href = '/cache/clear';
            }
        }
    </script>
</body>
</html>
