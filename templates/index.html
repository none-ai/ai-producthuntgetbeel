<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GetBeel - Product Hunt 产品导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 40px 0;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .card-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .card-desc {
            color: #666;
            font-size: 0.9em;
        }

        .info-box {
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 20px;
            color: white;
            text-align: center;
            margin-top: 30px;
        }

        .info-box a {
            color: #fff;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>GetBeel</h1>
            <p class="subtitle">Product Hunt 每日精选产品导航</p>
        </header>

        <div class="cards">
            <a href="/products" class="card">
                <div class="card-icon">🚀</div>
                <div class="card-title">今日产品</div>
                <div class="card-desc">查看今日最热门的 Product Hunt 产品</div>
            </a>

            <a href="/products?sort=votes" class="card">
                <div class="card-icon">🔥</div>
                <div class="card-title">热门投票</div>
                <div class="card-desc">按投票数排序的产品列表</div>
            </a>

            <a href="/products?sort=comments" class="card">
                <div class="card-icon">💬</div>
                <div class="card-title">热门评论</div>
                <div class="card-desc">按评论数排序的产品列表</div>
            </a>

            <a href="/cache/info" class="card">
                <div class="card-icon">💾</div>
                <div class="card-title">缓存信息</div>
                <div class="card-desc">查看和管理数据缓存</div>
            </a>
        </div>

        <div class="info-box">
            <p>数据来源: <a href="https://www.producthunt.com/" target="_blank">Product Hunt</a></p>
        </div>
    </div>
</body>
</html>
